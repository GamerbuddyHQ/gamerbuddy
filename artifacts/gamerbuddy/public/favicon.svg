<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0A0808"/>
      <stop offset="100%" stop-color="#080606"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF4D2D" stop-opacity="0.30"/>
      <stop offset="70%" stop-color="#FF4D2D" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#FF4D2D" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF4D2D" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#FF4D2D"/>
      <stop offset="100%" stop-color="#FF4D2D" stop-opacity="0.60"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="1.4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="16" cy="16" r="15.5" fill="url(#halo)"/>
  <circle cx="16" cy="16" r="14.5" fill="url(#bg)"/>
  <circle cx="16" cy="16" r="14.5" stroke="url(#ring)" stroke-width="1.2" opacity="0.9"/>
  <text
    x="16"
    y="20.5"
    text-anchor="middle"
    font-family="'Arial Black','Impact','Helvetica Neue',Arial,sans-serif"
    font-size="10"
    font-weight="900"
    letter-spacing="-0.5"
    fill="#FF4D2D"
    filter="url(#glow)"
  >P4H</text>
</svg>
